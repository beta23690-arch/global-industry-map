<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全球行业关系图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0d1018;
    --bg2: #141a26;
    --panel: #161c28;
    --line: #283142;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #5B8FF9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 30% 0%, #18223a 0%, var(--bg) 60%);
    color: var(--text);
    overflow: hidden;
  }
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 22px;
    display: flex; align-items: baseline; gap: 14px;
    pointer-events: none;
  }
  #topbar h1 { font-size: 19px; font-weight: 700; letter-spacing: .5px; }
  #topbar .hint { font-size: 12.5px; color: var(--muted); }
  #chart { width: 100%; height: 100%; }

  /* 详情面板 */
  #panel {
    position: fixed; top: 0; right: 0; height: 100%;
    width: 420px; max-width: 92vw;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--panel) 100%);
    border-left: 1px solid var(--line);
    box-shadow: -18px 0 50px rgba(0,0,0,.45);
    transform: translateX(105%);
    transition: transform .32s cubic-bezier(.22,.61,.36,1);
    z-index: 20;
    display: flex; flex-direction: column;
  }
  #panel.open { transform: translateX(0); }
  .p-head {
    padding: 22px 22px 16px; border-bottom: 1px solid var(--line);
    position: relative;
  }
  .p-tag {
    display: inline-block; font-size: 11px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
  }
  .p-title { font-size: 22px; font-weight: 800; }
  .p-intro { margin-top: 10px; font-size: 13.5px; line-height: 1.7; color: #c7cdda; }
  .p-close {
    position: absolute; top: 18px; right: 18px;
    width: 30px; height: 30px; border-radius: 8px;
    background: #222b3b; border: 1px solid var(--line); color: var(--muted);
    cursor: pointer; font-size: 17px; line-height: 1; pointer-events: auto;
  }
  .p-close:hover { color: var(--text); background: #2c3950; }
  .p-body { padding: 12px 16px 40px; overflow-y: auto; flex: 1; }

  .field { border: 1px solid var(--line); border-radius: 12px; margin: 10px 0; overflow: hidden; background: rgba(255,255,255,.015); }
  .field-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 15px; cursor: pointer; user-select: none;
  }
  .field-head:hover { background: rgba(255,255,255,.03); }
  .field-name { font-size: 14.5px; font-weight: 600; }
  .field-name .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:9px; vertical-align: middle; }
  .field-meta { font-size: 11.5px; color: var(--muted); display:flex; align-items:center; gap:8px; }
  .chev { transition: transform .25s; color: var(--muted); font-size: 12px; }
  .field.open .chev { transform: rotate(90deg); }
  .field-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .field.open .field-body { max-height: 1600px; }
  .field-inner { padding: 4px 13px 13px; }

  .company { display: block; text-decoration: none; color: inherit; padding: 11px 12px; border-radius: 9px; background: #10151f; border: 1px solid #222b3b; margin: 8px 0; cursor: pointer; transition: border-color .15s, background .15s; }
  .company:hover { border-color: #3a4a66; background: #131b29; }
  .c-link { display: block; margin-top: 8px; font-size: 11px; color: #5B8FF9; opacity: 0; transition: opacity .15s; }
  .company:hover .c-link { opacity: .95; }
  .c-head { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .c-name { font-size: 13.5px; font-weight: 700; }
  .ticker { font-size: 10.5px; font-weight: 700; color: #cdd6e8; background: #2a3850; padding: 2px 7px; border-radius: 5px; letter-spacing: .5px; }
  .loc { font-size: 13px; }
  .c-desc { margin-top: 6px; font-size: 12px; line-height: 1.6; color: var(--muted); }

  .legend-note { position: fixed; bottom: 14px; left: 22px; font-size: 11.5px; color: var(--muted); z-index: 5; }
  #panel .p-body::-webkit-scrollbar { width: 8px; }
  #panel .p-body::-webkit-scrollbar-thumb { background: #2c3950; border-radius: 4px; }

  /* 实时股价徽章 */
  .quote { margin-left: auto; display: inline-flex; align-items: baseline; gap: 7px; font-size: 12px; white-space: nowrap; }
  .q-price { font-weight: 700; color: #e8eaf0; }
  .q-chg { font-weight: 700; font-size: 11.5px; }
  .q-chg.up { color: #3fd07f; }
  .q-chg.down { color: #ff6b6b; }
  .q-na { color: #4d5567; font-size: 11px; }
  .quote { border-radius: 5px; }
  .quote.flash-up   { animation: qflash-up   .9s ease; }
  .quote.flash-down { animation: qflash-down .9s ease; }
  @keyframes qflash-up   { 0% { background: rgba(63,208,127,.38); } 100% { background: transparent; } }
  @keyframes qflash-down { 0% { background: rgba(255,107,107,.38); } 100% { background: transparent; } }

  /* 加载提示 */
  .q-loading { color: #5a6377; font-size: 12px; padding: 12px 4px; letter-spacing: 1px; }

  /* 市值规模条（相对本领域最大者） */
  .c-size { height: 3px; border-radius: 2px; background: #1b2330; margin: 9px 0 2px; overflow: hidden; }
  .c-size-fill { height: 100%; border-radius: 2px; opacity: .6; }

  /* 关键指标行：市值 / PE */
  .c-metrics { margin-top: 7px; }
  .m-row { display: flex; flex-wrap: wrap; gap: 16px; }
  .m-row .m { font-size: 11.5px; display: inline-flex; align-items: baseline; gap: 5px; }
  .m-row .m i { font-style: normal; color: #6b7488; }
  .m-row .m b { color: #cdd6e8; font-weight: 700; font-size: 12px; }

  /* 52 周位置条 */
  .c-range { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 10px; color: #6b7488; }
  .c-range .r-track { position: relative; flex: 1; height: 4px; border-radius: 3px;
    background: linear-gradient(90deg, #36507a, #6b86b8); }
  .c-range .r-dot { position: absolute; top: 50%; width: 9px; height: 9px; border-radius: 50%;
    background: #fff; transform: translate(-50%,-50%); box-shadow: 0 0 0 2px rgba(91,143,249,.45); }
  .c-range .r-pos { color: #aeb6c8; font-weight: 700; min-width: 30px; text-align: right; }

  /* 一年走势迷你图 */
  .c-spark { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .c-spark .spark { flex: none; border-radius: 3px; }
  .spark-chg { font-size: 11px; font-weight: 700; }
  .spark-chg.up { color: #3fd07f; }
  .spark-chg.down { color: #ff6b6b; }

  /* 行业概览卡 */
  .p-overview { margin: 4px 6px 14px; padding: 13px 15px; border: 1px solid var(--line);
    border-radius: 12px; background: linear-gradient(135deg, rgba(91,143,249,.10), rgba(91,143,249,.03)); }
  .ov-title { font-size: 11.5px; color: var(--muted); margin-bottom: 10px; letter-spacing: .3px; }
  .ov-grid { display: flex; gap: 10px; }
  .ov-tile { flex: 1; min-width: 0; }
  .ov-lab { font-size: 10.5px; color: #6b7488; }
  .ov-val { font-size: 15px; font-weight: 800; color: #e8eaf0; margin-top: 3px; }

  /* 排序 / 筛选控制栏 */
  .p-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 0 6px 12px; }
  .p-controls .ctl-label { font-size: 11px; color: #6b7488; margin-right: 2px; }
  .p-controls .ctl { font-size: 11.5px; color: #aeb6c8; background: #161c28; border: 1px solid var(--line);
    padding: 4px 10px; border-radius: 7px; cursor: pointer; }
  .p-controls .ctl:hover { background: #1d2433; color: #e8eaf0; }
  .p-controls .ctl.on { background: #2a3850; border-color: #3a4a66; color: #fff; font-weight: 700; }

  /* 对比：卡片勾选钮 + 选中态 */
  .c-cmp { flex: none; margin-left: 8px; width: 22px; height: 22px; border-radius: 6px; cursor: pointer;
    background: #161c28; border: 1px solid var(--line); color: #8b93a7; font-size: 13px; line-height: 1; padding: 0; }
  .c-cmp:hover { color: #e8eaf0; border-color: #3a4a66; }
  .c-cmp.on { background: #2a3850; border-color: #5B8FF9; color: #fff; }
  .company.sel { border-color: #5B8FF9; background: #141d2e; }

  /* 对比夹（底部浮条） */
  #cmp-tray { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(150%);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; max-width: 92vw; z-index: 30;
    background: #1b2536; border: 1px solid #2c3950; border-radius: 12px; padding: 9px 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5); transition: transform .25s; }
  #cmp-tray.show { transform: translateX(-50%) translateY(0); }
  #cmp-tray.nudge { animation: nudge .3s; }
  @keyframes nudge { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-54%) translateY(0); } }
  .cmp-tip { font-size: 11.5px; color: #8b93a7; }
  .cmp-chip { font-size: 12px; color: #e8eaf0; background: #243049; border-radius: 7px; padding: 4px 5px 4px 9px; display: inline-flex; align-items: center; gap: 3px; }
  .cmp-chip button { background: none; border: none; color: #8b93a7; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .cmp-chip button:hover { color: #ff6b6b; }
  .cmp-go { background: #5B8FF9; color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .cmp-go:disabled { background: #2a3850; color: #5a6377; cursor: default; }
  .cmp-clear { background: none; border: none; color: #8b93a7; cursor: pointer; font-size: 11.5px; }

  /* 对比弹窗 */
  #cmp-modal { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
    background: rgba(5,8,14,.66); padding: 20px; }
  #cmp-modal.show { display: flex; }
  .cc-panel { background: linear-gradient(180deg, #161c28, #11151f); border: 1px solid #2c3950; border-radius: 16px;
    max-width: 680px; width: 100%; max-height: 88vh; overflow: auto; padding: 20px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .cc-panel h3 { font-size: 16px; margin-bottom: 14px; }
  .cc-close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 8px; background: #222b3b; border: 1px solid var(--line); color: #8b93a7; cursor: pointer; font-size: 16px; }
  .cc-table { width: 100%; border-collapse: collapse; }
  .cc-table th, .cc-table td { padding: 9px 10px; text-align: right; border-bottom: 1px solid #222b3b; font-size: 12.5px; vertical-align: middle; }
  .cc-table th { text-align: left; color: #6b7488; font-weight: 600; white-space: nowrap; }
  .cc-table .cc-head td { text-align: center; font-weight: 800; font-size: 13px; color: #e8eaf0; }
  .cc-table .cc-tk { font-size: 10.5px; color: #8b93a7; font-weight: 400; margin-top: 2px; }
  .cc-table .up { color: #3fd07f; font-weight: 700; }
  .cc-table .down { color: #ff6b6b; font-weight: 700; }
  .cc-table svg.spark { width: 100px; height: 26px; }

  /* 免责声明 */
  .p-disclaimer { margin: 18px 6px 4px; padding-top: 14px; border-top: 1px solid var(--line);
    font-size: 11px; line-height: 1.7; color: #6b7488; }
  .p-disclaimer b { color: #98a1b5; font-weight: 700; }

  /* 刷新状态条 */
  .p-refresh { margin-top: 12px; font-size: 11px; color: #5a6377; display: none; align-items: center; gap: 6px; }
  .p-refresh.show { display: inline-flex; }
  .p-refresh .rdot { color: #3fd07f; font-size: 12px; }

</style>
</head>
<body>
  <div id="topbar">
    <h1>🌐 全球行业关系图</h1>
    <span class="hint">点击行业节点查看细分领域与代表公司 · 可拖动节点 / 滚轮缩放</span>
  </div>
  <div id="chart"></div>
  <div class="legend-note">点行业 → 展开领域：公司按市值排序，附 PE 与 52 周位置 · 行情腾讯免 Key 直连，每 60 秒刷新 · 市值折美元仅供比较 · 仅供参考，非投资建议</div>

  <div id="panel">
    <div class="p-head">
      <button class="p-close" onclick="closePanel()">✕</button>

    <div class="p-body" id="p-body"></div>

const byId = Object.fromEntries(DATA.map(d => [d.id, d]));
const categories = DATA.map(d => ({ name: d.name, itemStyle:{ color:d.color } }));
const catIndex = Object.fromEntries(DATA.map((d,i) => [d.id, i]));

const nodes = DATA.map(d => {
  const compCount = d.fields.reduce((a,f)=>a+f.companies.length,0);
  return {
    id: d.id, name: d.name,
    symbolSize: 34 + d.fields.length*3 + compCount*0.6,
    category: catIndex[d.id],
    value: d.fields.length + ' 个细分领域',

});

  source: l.s, target: l.t,
  label: { show:true, formatter:l.r, fontSize:10, color:'#7f8aa3' },
}));

/* ===================== 详情面板 ===================== */
const panel = document.getElementById('panel');
let curD = null;                         // 当前打开的行业（供领域按需渲染时取公司列表）
function openPanel(id){
  const d = byId[id]; curD = d;
  document.getElementById('p-tag').textContent = 'INDUSTRY · 行业';
  document.getElementById('p-title').textContent = d.name;
  document.getElementById('p-title').style.color = d.color;
  document.getElementById('p-intro').textContent = d.intro;
  const body = document.getElementById('p-body');
  // 顶部行业概览卡 + 各领域外壳（领域展开时才抓行情、按市值排序填充）
  body.innerHTML = `<div class="p-overview" id="p-overview">行业概览加载中…</div>`
    + controlsHTML()
    + d.fields.map((f,i) => `
    <div class="field" data-i="${i}">
      <div class="field-head" onclick="toggleField(this)">
        <span class="field-name"><span class="dot" style="background:${d.color}"></span>${f.name}</span>
        <span class="field-meta">${f.companies.length} 家 · 按市值排序 <span class="chev">▶</span></span>
      </div>
      <div class="field-body"><div class="field-inner"></div></div>
    </div>`).join('')
    + `<div class="p-disclaimer">市值已折算美元、仅供跨市场比较；价格与估值来自公开行情，可能延迟或偏差。<b>本页仅供学习与研究参考，不构成任何投资建议，请自行判断 (DYOR)。</b></div>`;
  document.getElementById('p-refresh').classList.remove('show');   // 新行业未加载行情，先隐藏刷新条
  panel.classList.add('open');
  loadIndustry(d);                              // 批量抓全行业行情 → 概览卡 + 暖缓存
}
function toggleField(el){
  const field = el.parentElement;
  field.classList.toggle('open');
  if(field.classList.contains('open') && field.dataset.loaded !== '1') renderField(field);
}
function closePanel(){ panel.classList.remove('open'); }
document.addEventListener('keydown', e => {
  if(e.key !== 'Escape') return;
  const m = document.getElementById('cmp-modal');
  if(m && m.classList.contains('show')) closeCompare(); else closePanel();
});

/* ===================== 实时股价（全部走腾讯 qt.gtimg.cn，免 Key） =====================
   全站统一一个数据源：腾讯行情，返回 CORS *、按 GBK 解码、字段 a[3]=现价 a[4]=昨收。
   - QSYM:     数据里的代码 → 美股/ADR 符号；查询时自动加 us 前缀（如 NVDA→usNVDA、NESN→usNSRGY），美元计价。
   - TENCENT:  A股/港股 → 腾讯原生代码（sh/sz=¥、hk=HK$）。
   - QSYM_OVR: 个别特例（本土无美股、只有伦敦 GDR 等）直接给完整腾讯代码。
   三者都未命中的（沙特阿美、未上市等）不报价，显示 — 。 */
const QSYM = {
  // 美股直接上市
  'NVDA':'NVDA','AVGO':'AVGO','MSFT':'MSFT','ORCL':'ORCL','CRM':'CRM','SAP':'SAP',
  'GOOGL':'GOOGL','META':'META','AMZN':'AMZN','AAPL':'AAPL','TSM':'TSM','ASML':'ASML',

// 腾讯行情：fetch 直连（接口返回 CORS *），按 GBK 解码，无需 Key
async function fetchTencent(sym){
  const r = await fetch('https://qt.gtimg.cn/q=' + sym);
  if(!r.ok) throw new Error('http');
  const buf = await r.arrayBuffer();
  let txt;
  try { txt = new TextDecoder('gbk').decode(buf); }
  catch(_) { txt = new TextDecoder().decode(buf); }
  const m = txt.match(/="([^"]*)"/);
  return parseTencent(m ? m[1] : '', sym);
}
// 批量取行情：一次请求多只（用逗号分隔），返回 { sym: 行情对象 }
async function fetchTencentBatch(syms){
  const out = {};
  if(!syms.length) return out;
  // 分块，避免 URL 过长
  for(let i=0; i<syms.length; i+=40){
    const part = syms.slice(i, i+40);
    try{
      const r = await fetch('https://qt.gtimg.cn/q=' + part.join(','));
      const txt = new TextDecoder('gbk').decode(await r.arrayBuffer());
      for(const line of txt.split('\n')){
        const m = line.match(/v_([^=]+)="([^"]*)"/);
        if(m && m[2]){ const q = parseTencent(m[2], m[1]); if(q) out[m[1]] = q; }
      }
    }catch(_){ /* 该块失败则跳过，仍返回已成功的 */ }
  }
  return out;
}
function parseTencent(raw, sym){
  if(!raw) return null;
  const a = raw.split('~');
  const cur = parseFloat(a[3]), prev = parseFloat(a[4]);   // a[3]=现价 a[4]=昨收
  if(!isFinite(cur) || cur === 0) return null;
  const d = isFinite(prev) ? cur - prev : 0;
  const dp = (isFinite(prev) && prev !== 0) ? d / prev * 100 : 0;
  const us = /^us/.test(sym), uk = /^uk/.test(sym), hk = /^hk/.test(sym);
  const o = { c: cur, d: d, dp: dp, code: a[2] || '',   // a[2]=交易所原生代码（如 AAPL.OQ），推东财 secid 用
              cur: (us||uk) ? 'USD' : (hk ? 'HKD' : 'CNY'),
              pe:null, mcap:null, mcapUsd:null, hi52:null, lo52:null };
  // 估值/市值/52周字段：各市场下标略不同。uk（三星 GDR）这些字段不可靠，直接跳过。
  if(!uk){
    const I = (us || hk) ? {pe:39, mcap:45, hi:48, lo:49}   // 美股/ADR、港股
                         : {pe:39, mcap:45, hi:47, lo:48};  // A 股（52周高低前移一位）
    const num = i => { const v = parseFloat(a[i]); return isFinite(v) ? v : null; };
    o.pe = num(I.pe);  o.mcap = num(I.mcap);  o.hi52 = num(I.hi);  o.lo52 = num(I.lo);
    if(o.pe   !== null && o.pe   <= 0) o.pe = null;          // 亏损/无 PE → 不显示
    if(o.mcap !== null && o.mcap <= 0) o.mcap = null;
    if(o.mcap !== null) o.mcapUsd = o.mcap * (FX_USD[o.cur] || 1);   // 统一折美元，供跨市场排序/比规模/显示
  }
  return o;
}
const CUR_SYM = { USD:'$', CNY:'¥', HKD:'HK$', EUR:'€', JPY:'JP¥', GBP:'£', KRW:'₩' };
// 折美元汇率（市值跨市场比较用；港币锚定 7.8、人民币波动平缓，静态近似足够）

// 市值格式化（已折美元，单位：亿美元）。exact=false 表示由港币/人民币换算而来，加 ≈
function fmtMcapUsd(usd, exact){
  const p = exact ? '$' : '≈$';
  if(usd >= 10000) return p + (usd/10000).toFixed(2) + '万亿';
  if(usd >= 1)     return p + Math.round(usd).toLocaleString() + '亿';
  return p + usd.toFixed(2) + '亿';
}
// 关键指标：市值（美元口径） / PE / 52周位置条（拿不到的项自动省略）

          + `<span class="r-end">${(+q.hi52).toFixed(2)}</span>`

  return (items.length ? `<div class="m-row">${items.join('')}</div>` : '') + range;

/* ---------- 一年走势迷你图 ---------- */
const klineCache = {};                       // sym → 近一年收盘价数组（或 null）
// 取近一年日收盘——全部走腾讯 ifzq（A股/港股已证明浏览器可用的全球 CDN）。
// A股/港股用原代码；美股/ADR 用「前缀 + 交易所代码」（如 usAAPL.OQ、usBRK.B.N），代码取自行情 a[2]=q.code。
async function fetchKline(sym, q){
  if(klineCache[sym] !== undefined) return klineCache[sym];
  let closes = null;
  try{
    let param = sym;
    if(/^(us|uk)/.test(sym)){
      if(!q || !q.code){ klineCache[sym] = null; return null; }
      param = sym.slice(0, 2) + q.code;                 // usAAPL → us + AAPL.OQ
    }
    const j = await (await fetch(`https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${param},day,,,260,qfq`)).json();
    const node = (j && j.data) ? (j.data[param] || Object.values(j.data).find(v => v && (v.qfqday || v.day))) : null;
    const arr = node && (node.qfqday || node.day);
    if(arr) closes = arr.map(r => parseFloat(r[2])).filter(isFinite);
  }catch(_){ closes = null; }
  if(closes && closes.length < 5) closes = null;        // 数据太少不画（如三星 GDR 无历史）
  klineCache[sym] = closes;
  return closes;
}
// 收盘价数组 → 迷你折线 SVG（涨绿跌红，带浅色面积）
function sparklineSVG(closes){
  const n = closes.length, W = 132, H = 30, pad = 2;
  let lo = Math.min(...closes), hi = Math.max(...closes);
  if(hi === lo) hi = lo + 1;
  const x = i => pad + i / (n - 1) * (W - 2 * pad);
  const y = v => pad + (1 - (v - lo) / (hi - lo)) * (H - 2 * pad);
  const pts = closes.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const up = closes[n - 1] >= closes[0], col = up ? '#3fd07f' : '#ff6b6b';
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" preserveAspectRatio="none">`
       + `<polyline points="${pad},${H-pad} ${pts} ${W-pad},${H-pad}" fill="${col}" opacity="0.12"/>`
       + `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.4" stroke-linejoin="round"/></svg>`;
}
// 给容器内所有卡片异步填充走势图（拿不到则移除占位）
function loadSparklines(container){
  container.querySelectorAll('.c-spark[data-spark]').forEach(async slot => {
    const sym = slot.dataset.spark;
    const closes = await fetchKline(sym, quoteCache[sym]);
    if(!closes){ slot.remove(); return; }
    const chg = (closes[closes.length - 1] / closes[0] - 1) * 100, up = chg >= 0;
    slot.innerHTML = sparklineSVG(closes)
      + `<span class="spark-chg ${up?'up':'down'}">近一年 ${up?'+':''}${chg.toFixed(1)}%</span>`;
  });
}

// 打开行业时：一次批量抓全行业行情 → 暖缓存 + 渲染概览（总市值 / 中位 PE / 年内位置）
async function loadIndustry(d){
  const syms = [...new Set(d.fields.flatMap(f => f.companies.map(c => quoteSym(c.ticker)).filter(Boolean)))];
  const map = await fetchTencentBatch(syms);
  Object.assign(quoteCache, map);
  const el = document.getElementById('p-overview');
  if(!el || curD !== d) return;                          // 已切换到别的行业则放弃
  const qs = syms.map(s => quoteCache[s]).filter(Boolean);
  const median = arr => { const a = arr.filter(v => v != null).sort((x,y)=>x-y); return a.length ? a[Math.floor(a.length/2)] : null; };
  const totalUsd = qs.reduce((a,q) => a + (q.mcapUsd || 0), 0);
  const medPe = median(qs.map(q => q.pe).filter(v => v > 0));
  const medPos = median(qs.map(q => (q.hi52 && q.lo52 && q.hi52 > q.lo52) ? (q.c - q.lo52)/(q.hi52 - q.lo52)*100 : null));
  const tile = (lab, val) => `<div class="ov-tile"><div class="ov-lab">${lab}</div><div class="ov-val">${val}</div></div>`;
  el.innerHTML = `<div class="ov-title">行业概览 · ${qs.length} 只成分股有行情</div><div class="ov-grid">`
    + tile('总市值', totalUsd ? fmtMcapUsd(totalUsd, false) : '—')
    + tile('中位 PE', medPe != null ? medPe.toFixed(1) : '—')
    + tile('年内位置', medPos != null ? Math.round(medPos) + '%' : '—')
    + `</div>`;
}

function cmpRows(x, y){
  const ok = v => v != null && isFinite(v);
  let vx, vy, dir;
  if(sortKey === 'pe'){ vx = x.q && x.q.pe;     vy = y.q && y.q.pe;     dir = 1;  }   // PE 升序：便宜在前
  else if(sortKey === 'day'){  vx = x.q && x.q.dp; vy = y.q && y.q.dp; dir = -1; }    // 当日涨幅降序
  else if(sortKey === 'year'){ vx = x.year;       vy = y.year;         dir = -1; }    // 近一年涨幅降序
  else { vx = x.q && x.q.mcapUsd; vy = y.q && y.q.mcapUsd; dir = -1; }                // 市值降序
  const ax = ok(vx), ay = ok(vy);
  if(ax && ay) return dir * (vx - vy);
  return ax ? -1 : (ay ? 1 : 0);                 // 缺该指标的排在后面
}

function toggleCompare(e, sym){
  e.preventDefault(); e.stopPropagation();

  else { if(compareSet.size >= 3){ flashTray(); return; } compareSet.add(sym); }
  syncCardSel(sym); renderTray();
}
function syncCardSel(sym){                       // 同步该 sym 所有可见卡片的勾选态

    card.classList.toggle('sel', on);
    const b = card.querySelector('.c-cmp'); if(b){ b.textContent = on ? '✓' : '＋'; b.classList.toggle('on', on); }
  });

function clearCompare(){ const arr = [...compareSet]; compareSet.clear(); arr.forEach(syncCardSel); renderTray(); }
function flashTray(){ const t = document.getElementById('cmp-tray'); if(t){ t.classList.add('nudge'); setTimeout(() => t.classList.remove('nudge'), 300); } }
function renderTray(){
  let tray = document.getElementById('cmp-tray');

  if(compareSet.size === 0){ tray.classList.remove('show'); tray.innerHTML = ''; return; }

  tray.innerHTML = `<span class="cmp-tip">对比夹 ${compareSet.size}/3</span>${chips}`
    + `<button class="cmp-go"${compareSet.size < 2 ? ' disabled' : ''} onclick="openCompare()">对比 ▸</button>`
    + `<button class="cmp-clear" onclick="clearCompare()">清空</button>`;
  tray.classList.add('show');
}
async function openCompare(){
  const syms = [...compareSet];
  if(syms.length < 2) return;
  let modal = document.getElementById('cmp-modal');
  if(!modal){ modal = document.createElement('div'); modal.id = 'cmp-modal'; modal.onclick = e => { if(e.target === modal) closeCompare(); }; document.body.appendChild(modal); }
  modal.innerHTML = '<div class="cc-panel"><div class="q-loading">对比加载中…</div></div>';
  modal.classList.add('show');
  const data = await Promise.all(syms.map(async s => ({ s, info: symInfo[s] || {}, q: quoteCache[s], cl: await fetchKline(s, quoteCache[s]) })));
  const cy = q => CUR_SYM[q && q.cur] || '';
  const col = (v, txt) => `<span class="${v >= 0 ? 'up' : 'down'}">${txt}</span>`;
  const row = (label, cells) => `<tr><th>${label}</th>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
  const head  = data.map(d => `<td class="cc-name">${d.info.name || d.s}<div class="cc-tk">${d.info.ticker || ''} ${d.info.loc || ''}</div></td>`).join('');
  const price = data.map(d => d.q ? cy(d.q) + d.q.c.toFixed(2) : '—');
  const day   = data.map(d => d.q ? col(d.q.dp, (d.q.dp>=0?'+':'') + d.q.dp.toFixed(2) + '%') : '—');
  const year  = data.map(d => { const y = yearChgFrom(d.cl); return y != null ? col(y, (y>=0?'+':'') + y.toFixed(1) + '%') : '—'; });
  const spark = data.map(d => d.cl ? sparklineSVG(d.cl) : '—');
  const mcap  = data.map(d => d.q && d.q.mcapUsd ? fmtMcapUsd(d.q.mcapUsd, d.q.cur === 'USD') : '—');
  const pe    = data.map(d => d.q && d.q.pe ? d.q.pe.toFixed(1) : '—');
  const pos   = data.map(d => { const q = d.q; return (q && q.hi52 && q.lo52 && q.hi52 > q.lo52) ? Math.round(Math.min(100, Math.max(0, (q.c-q.lo52)/(q.hi52-q.lo52)*100))) + '%' : '—'; });
  modal.innerHTML = `<div class="cc-panel"><button class="cc-close" onclick="closeCompare()">✕</button><h3>公司对比</h3>`
    + `<table class="cc-table"><tr class="cc-head"><th></th>${head}</tr>`
    + row('现价', price) + row('当日', day) + row('近一年', year) + row('走势', spark)
    + row('市值', mcap) + row('PE', pe) + row('52周位置', pos)
    + `</table><div class="p-disclaimer" style="margin-top:16px">市值折美元仅供比较；数据来自公开行情，可能延迟或偏差。<b>仅供参考，非投资建议。</b></div></div>`;
}
function closeCompare(){ const m = document.getElementById('cmp-modal'); if(m) m.classList.remove('show'); }

// 展开领域：抓行情 → 按当前“排序/筛选”整理 → 渲染（含指标、规模条、走势图）
async function renderField(field){
  field.dataset.loaded = '1';
  const inner = field.querySelector('.field-inner');
  if(!inner.innerHTML) inner.innerHTML = '<div class="q-loading">正在加载行情…</div>';   // 仅首次空白时显示
  const companies = (curD.fields[+field.dataset.i] || {}).companies || [];
  let rows = await Promise.all(companies.map(async c => {
    const sym = quoteSym(c.ticker);
    let q = null;
    if(sym){
      if(quoteCache[sym]) q = quoteCache[sym];
      else { try { q = await fetchTencent(sym); if(q) quoteCache[sym] = q; } catch(_){ q = null; } }
    }
    return { c, sym, q };
  }));
  if(marketFilter !== 'all') rows = rows.filter(r => r.sym && marketOf(r.sym) === marketFilter);   // 市场筛选
  if(sortKey === 'year')                        // 近一年排序需先取K线（已缓存则瞬时）
    await Promise.all(rows.map(async r => { if(r.sym) r.year = yearChgFrom(await fetchKline(r.sym, r.q)); }));
  rows.sort(cmpRows);
  const maxMcap = Math.max(1, ...rows.map(r => (r.q && r.q.mcapUsd) || 0));
  inner.innerHTML = rows.length
    ? rows.map(r => cardHTML(r.c, r.sym, r.q, maxMcap)).join('')
    : '<div class="q-loading">（无符合所选市场的公司）</div>';
  rows.forEach(r => { if(r.sym){ symInfo[r.sym] = { name:r.c.name, ticker:r.c.ticker, loc:r.c.loc };   // 记录信息（对比用）
    if(r.q && typeof r.q.c === 'number') lastPrice[r.sym] = r.q.c; } });                                // 基线价，首次不闪
  loadSparklines(inner);                       // 异步填充各卡片一年走势图
  markRefreshed();
}
function refreshOpenQuotes(){
  const open = document.querySelectorAll('.field.open');
  if(open.length) markRefreshed();            // 证明定时器已触发，即便随后接口无变化/失败
  open.forEach(f=>{
    f.querySelectorAll('.company[data-sym]').forEach(card=>{
      const sym = card.dataset.sym;
      delete quoteCache[sym];
      fetchTencent(sym)
        .then(q=>{ if(q) quoteCache[sym] = q; applyCardQuote(card, q); })
        .catch(()=>{});                         // 拿不到就保留旧值
    });
  });
}
// 每 60 秒自动刷新当前展开领域的行情
setInterval(refreshOpenQuotes, 60000);
</script>

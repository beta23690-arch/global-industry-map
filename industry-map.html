<style>
  :root {
    --bg: #0d1018;
    --bg2: #141a26;
    --panel: #161c28;
    --line: #283142;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #5B8FF9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 30% 0%, #18223a 0%, var(--bg) 60%);
    color: var(--text);
    overflow: hidden;
  }
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 22px;
    display: flex; align-items: baseline; gap: 14px;
    pointer-events: none;
  }
  #topbar h1 { font-size: 19px; font-weight: 700; letter-spacing: .5px; }
  #topbar .hint { font-size: 12.5px; color: var(--muted); }
  #chart { width: 100%; height: 100%; }

  /* 详情面板 */
  #panel {
    position: fixed; top: 0; right: 0; height: 100%;
    width: 420px; max-width: 92vw;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--panel) 100%);
    border-left: 1px solid var(--line);
    box-shadow: -18px 0 50px rgba(0,0,0,.45);
    transform: translateX(105%);
    transition: transform .32s cubic-bezier(.22,.61,.36,1);
    z-index: 20;
    display: flex; flex-direction: column;
  }
  #panel.open { transform: translateX(0); }
  .p-head {
    padding: 22px 22px 16px; border-bottom: 1px solid var(--line);
    position: relative;
  }
  .p-tag {
    display: inline-block; font-size: 11px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
  }
  .p-title { font-size: 22px; font-weight: 800; }
  .p-intro { margin-top: 10px; font-size: 13.5px; line-height: 1.7; color: #c7cdda; }
  .p-close {
    position: absolute; top: 18px; right: 18px;
    width: 30px; height: 30px; border-radius: 8px;
    background: #222b3b; border: 1px solid var(--line); color: var(--muted);
    cursor: pointer; font-size: 17px; line-height: 1; pointer-events: auto;
  }
  .p-close:hover { color: var(--text); background: #2c3950; }
  .p-body { padding: 12px 16px 40px; overflow-y: auto; flex: 1; }

  .field { border: 1px solid var(--line); border-radius: 12px; margin: 10px 0; overflow: hidden; background: rgba(255,255,255,.015); }
  .field-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 15px; cursor: pointer; user-select: none;
  }
  .field-head:hover { background: rgba(255,255,255,.03); }
  .field-name { font-size: 14.5px; font-weight: 600; }
  .field-name .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:9px; vertical-align: middle; }
  .field-meta { font-size: 11.5px; color: var(--muted); display:flex; align-items:center; gap:8px; }
  .chev { transition: transform .25s; color: var(--muted); font-size: 12px; }
  .field.open .chev { transform: rotate(90deg); }
  .field-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .field.open .field-body { max-height: 1600px; }
  .field-inner { padding: 4px 13px 13px; }

  .company { display: block; text-decoration: none; color: inherit; padding: 11px 12px; border-radius: 9px; background: #10151f; border: 1px solid #222b3b; margin: 8px 0; cursor: pointer; transition: border-color .15s, background .15s; }
  .company:hover { border-color: #3a4a66; background: #131b29; }
  .c-link { display: block; margin-top: 8px; font-size: 11px; color: #5B8FF9; opacity: 0; transition: opacity .15s; }
  .company:hover .c-link { opacity: .95; }
  .c-head { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .c-name { font-size: 13.5px; font-weight: 700; }
  .ticker { font-size: 10.5px; font-weight: 700; color: #cdd6e8; background: #2a3850; padding: 2px 7px; border-radius: 5px; letter-spacing: .5px; }
  .loc { font-size: 13px; }
  .c-desc { margin-top: 6px; font-size: 12px; line-height: 1.6; color: var(--muted); }

  .legend-note { position: fixed; bottom: 14px; left: 22px; font-size: 11.5px; color: var(--muted); z-index: 5; }
  #panel .p-body::-webkit-scrollbar { width: 8px; }
  #panel .p-body::-webkit-scrollbar-thumb { background: #2c3950; border-radius: 4px; }

  /* 实时股价徽章 */
  .quote { margin-left: auto; display: inline-flex; align-items: baseline; gap: 7px; font-size: 12px; white-space: nowrap; }
  .q-price { font-weight: 700; color: #e8eaf0; }
  .q-chg { font-weight: 700; font-size: 11.5px; }
  .q-chg.up { color: #3fd07f; }
  .q-chg.down { color: #ff6b6b; }
  .q-load { color: #5a6377; letter-spacing: 1px; }
  .q-na { color: #4d5567; font-size: 11px; }

  /* API Key 设置条 */
  #key-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    display: none; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 11px 18px; background: #1b2536; border-bottom: 1px solid #2c3950;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); font-size: 13px;
  }

  #key-banner .kb-text { color: #c7cdda; }
  #key-banner a { color: #61DDAA; text-decoration: none; }
  #key-banner a:hover { text-decoration: underline; }
  #key-input {
    flex: 1; min-width: 180px; max-width: 360px;
    background: #0e131d; border: 1px solid #2c3950; color: #e8eaf0;
    padding: 7px 11px; border-radius: 8px; font-size: 13px; outline: none;
  }
  #key-input:focus { border-color: #5B8FF9; }
  .kb-btn { background: #5B8FF9; color: #fff; border: none; cursor: pointer; padding: 7px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .kb-btn.ghost { background: #2a3850; }
  #gear {
    position: fixed; bottom: 14px; right: 18px; z-index: 6;
    width: 38px; height: 38px; border-radius: 10px;
    background: #1b2536; border: 1px solid #2c3950; color: #aeb6c8;
    cursor: pointer; font-size: 17px; line-height: 1;
  }
  #gear:hover { color: #fff; background: #243049; }
</style>

// 点击公司 → 跳转对应财经页（股价 / 新闻 / 财报）
function companyURL(c){
  const tx = TENCENT[c.ticker], fh = QSYM[c.ticker];
  if(tx){
    return tx.indexOf('hk') === 0
      ? 'https://quote.eastmoney.com/hk/' + tx.slice(2) + '.html'   // 港股 → 东方财富
      : 'https://quote.eastmoney.com/' + tx + '.html';             // A股 sh/sz → 东方财富
  }
  if(fh) return 'https://finance.yahoo.com/quote/' + fh.replace('.', '-') + '/';   // 美股/ADR → Yahoo Finance
  return 'https://www.bing.com/search?q=' + encodeURIComponent(c.name + ' 公司 财报 新闻');   // 未上市 → 财经搜索
}

function getKey(){ return localStorage.getItem('finnhub_key') || ''; }
function showBanner(){ document.getElementById('key-input').value = getKey(); document.getElementById('key-banner').style.display = 'flex'; }
function hideBanner(){ document.getElementById('key-banner').style.display = 'none'; }
function saveKey(){
  const v = document.getElementById('key-input').value.trim();
  if(!v) return;
  localStorage.setItem('finnhub_key', v);
  hideBanner();
  refreshOpenQuotes();
}
async function fetchQuote(sym){
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${getKey()}`);
  if(r.status === 429){ const e = new Error('rate'); e.rate = true; throw e; }
  if(r.status === 401 || r.status === 403){ const e = new Error('auth'); e.auth = true; throw e; }
  if(!r.ok) throw new Error('http');
  return r.json();
}
// 腾讯行情：fetch 直连（接口返回 CORS *），按 GBK 解码，无需 Key
async function fetchTencent(sym){
  const r = await fetch('https://qt.gtimg.cn/q=' + sym);
  if(!r.ok) throw new Error('http');
  const buf = await r.arrayBuffer();
  let txt;
  try { txt = new TextDecoder('gbk').decode(buf); }
  catch(_) { txt = new TextDecoder().decode(buf); }
  const m = txt.match(/="([^"]*)"/);
  return parseTencent(m ? m[1] : '', sym);
}
function parseTencent(raw, sym){
  if(!raw) return null;
  const a = raw.split('~');
  const cur = parseFloat(a[3]), prev = parseFloat(a[4]);   // a[3]=现价 a[4]=昨收
  if(!isFinite(cur) || cur === 0) return null;
  const d = isFinite(prev) ? cur - prev : 0;
  const dp = (isFinite(prev) && prev !== 0) ? d / prev * 100 : 0;
  return { c: cur, d: d, dp: dp, cur: sym.indexOf('hk') === 0 ? 'HKD' : 'CNY' };
}
const CUR_SYM = { USD:'$', CNY:'¥', HKD:'HK$', EUR:'€', JPY:'JP¥', GBP:'£', KRW:'₩' };
function renderQuote(q, d, cur){
  if(!d || typeof d.c !== 'number' || d.c === 0){ q.innerHTML = '<span class="q-na">暂无</span>'; return; }
  cur = cur || 'USD';
  const sym = CUR_SYM[cur] || '';
  const up = (d.d || 0) >= 0;
  q.title = '最新价 ' + sym + d.c + ' ' + cur + '（日内 ' + (up?'+':'') + (d.d||0).toFixed(2) + '）· ' + (cur==='USD' ? 'Finnhub' : '腾讯行情');
  q.innerHTML = `<span class="q-price">${sym}${d.c.toFixed(2)}</span><span class="q-chg ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(d.dp||0).toFixed(2)}%</span>`;
}
function applyQuote(q, obj){
  q.dataset.done = '1';
  if(!obj){ q.innerHTML = '<span class="q-na">暂无</span>'; return; }
  renderQuote(q, obj, obj.cur);
}
function loadQuotes(field){
  field.querySelectorAll('.quote[data-sym]').forEach(q=>{
    if(q.dataset.done === '1') return;
    const sym = q.dataset.sym;
    if(quoteCache[sym]){ applyQuote(q, quoteCache[sym]); return; }
    if(q.dataset.src === 'tencent'){           // A股/港股：腾讯，免 Key
      fetchTencent(sym)
        .then(d=>{ if(d) quoteCache[sym] = d; applyQuote(q, d); })
        .catch(()=>{ q.innerHTML = '<span class="q-na">—</span>'; });
    } else {                                    // 美股/ADR：Finnhub，需 Key
      if(!getKey()){ q.innerHTML = '<span class="q-na" style="cursor:pointer" onclick="event.preventDefault();event.stopPropagation();showBanner()">设置 Key 启用</span>'; return; }
      fetchQuote(sym)
        .then(d=>{ quoteCache[sym] = d; applyQuote(q, d); })
        .catch(e=>{ q.innerHTML = '<span class="q-na">' + (e.rate?'限流稍候':e.auth?'Key 无效':'—') + '</span>'; });
    }
  });
}
function refreshOpenQuotes(){
  document.querySelectorAll('.field.open').forEach(f=>{
    f.querySelectorAll('.quote[data-sym]').forEach(q=>{ delete quoteCache[q.dataset.sym]; q.dataset.done = ''; });
    loadQuotes(f);
  });
}
// 每 60 秒自动刷新当前展开领域的行情
setInterval(refreshOpenQuotes, 60000);
// 首次进入若未设置 Key，弹出设置条
if(!getKey()) showBanner();
</script>
</body>
</html>
